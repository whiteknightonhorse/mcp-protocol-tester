name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Every Monday 06:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  # 1. Scan for hardcoded secrets (API keys, private keys, tokens)
  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

      - name: Gitleaks Secret Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 2. Static analysis for code vulnerabilities
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # 3. Dependency vulnerability scan
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: npm audit
        run: npm audit --audit-level=high || true

      - name: Snyk vulnerability scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  # 4. Verify no secrets in code (custom grep)
  no-secrets-check:
    name: No Hardcoded Secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for private keys
        run: |
          echo "Scanning for hardcoded private keys..."
          if grep -rn "0x[0-9a-fA-F]\{64\}" --include="*.js" --include="*.ts" --include="*.json" \
            --exclude-dir=node_modules --exclude=".env.example" .; then
            echo "::error::Found potential private key in source code!"
            exit 1
          fi
          echo "No private keys found in source code."

      - name: Check for API keys
        run: |
          echo "Scanning for hardcoded API keys..."
          if grep -rn "ak_live_[0-9a-f]\{32\}" --include="*.js" --include="*.ts" --include="*.json" \
            --exclude-dir=node_modules --exclude=".env.example" .; then
            echo "::error::Found hardcoded API key in source code!"
            exit 1
          fi
          echo "No hardcoded API keys found."

      - name: Check for GitHub tokens
        run: |
          echo "Scanning for GitHub tokens..."
          if grep -rn "ghp_\|gho_\|github_pat_" --include="*.js" --include="*.ts" --include="*.json" --include="*.yml" \
            --exclude-dir=node_modules .; then
            echo "::error::Found GitHub token in source code!"
            exit 1
          fi
          echo "No GitHub tokens found."

      - name: Check .env is gitignored
        run: |
          if git ls-files --error-unmatch .env 2>/dev/null; then
            echo "::error::.env file is tracked by git!"
            exit 1
          fi
          echo ".env is properly gitignored."

      - name: Check no sensitive files committed
        run: |
          echo "Checking for sensitive files..."
          SENSITIVE=$(git ls-files | grep -E '\.env$|\.key$|\.pem$|private' || true)
          if [ -n "$SENSITIVE" ]; then
            echo "::error::Sensitive files found in repo: $SENSITIVE"
            exit 1
          fi
          echo "No sensitive files in repository."

  # 5. Verify code doesn't exfiltrate data
  no-exfiltration:
    name: No Data Exfiltration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for suspicious outbound calls
        run: |
          echo "Scanning for suspicious data exfiltration patterns..."
          SUSPICIOUS=0

          # Check for base64 encoding of env vars
          if grep -rn "btoa.*process\.env\|Buffer.*process\.env.*base64" --include="*.js" \
            --exclude-dir=node_modules .; then
            echo "::warning::Found base64 encoding of environment variables"
            SUSPICIOUS=$((SUSPICIOUS + 1))
          fi

          # Check for fetch/http calls to unknown hosts (not the target server)
          if grep -rn "fetch\|http\.request\|https\.request" --include="*.js" \
            --exclude-dir=node_modules --exclude="lib/http.js" --exclude="lib/mcp-client.js" . | \
            grep -v "config\.\|apiBaseUrl\|apiUrl\|mcpServerUrl\|facilitator\|rpc\.tempo\|rpc\.moderato\|localhost\|127\.0\.0\|example\.com\|evil\.com\|169\.254\|metadata\.google" | \
            grep -v "test\|spec\|mock\|//\|require" | head -5; then
            echo "::warning::Found HTTP calls to potentially unknown hosts — review manually"
          fi

          # Check for eval/Function constructor
          if grep -rn "eval(\|new Function(" --include="*.js" --exclude-dir=node_modules .; then
            echo "::error::Found eval() or new Function() — potential code injection!"
            SUSPICIOUS=$((SUSPICIOUS + 1))
          fi

          # Check for child_process/exec
          if grep -rn "child_process\|\.exec(\|\.execSync(" --include="*.js" --exclude-dir=node_modules .; then
            echo "::error::Found child_process usage — potential command injection!"
            SUSPICIOUS=$((SUSPICIOUS + 1))
          fi

          # Check for fs.write to unexpected locations
          if grep -rn "fs\.write\|writeFile" --include="*.js" --exclude-dir=node_modules . | \
            grep -v "reports\|reporter\|\.txt\|\.json\|\.log" | head -5; then
            echo "::warning::Found file writes outside reports/ — review manually"
          fi

          if [ "$SUSPICIOUS" -gt 0 ]; then
            echo "::error::Found $SUSPICIOUS suspicious patterns!"
            exit 1
          fi
          echo "No data exfiltration patterns detected."

  # 6. Lint and syntax check
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Syntax check all JS files
        run: |
          echo "Checking syntax of all source files..."
          ERRORS=0
          for f in $(find src -name "*.js"); do
            if ! node -c "$f" 2>/dev/null; then
              echo "::error::Syntax error in $f"
              ERRORS=$((ERRORS + 1))
            fi
          done
          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::$ERRORS files have syntax errors!"
            exit 1
          fi
          echo "All $(find src -name '*.js' | wc -l) files pass syntax check."

      - name: Check for console.error with sensitive data
        run: |
          if grep -rn "console.*privateKey\|console.*PRIVATE_KEY\|console.*secret\|console.*password" \
            --include="*.js" --exclude-dir=node_modules .; then
            echo "::error::Found potential secret logging!"
            exit 1
          fi
          echo "No secret logging detected."
